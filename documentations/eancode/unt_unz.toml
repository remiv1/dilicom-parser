# Configuration EANCOM D96A - Segments UNT et UNZ (Footer)
# Page 8

[unt]
description = "Footer du message"
segment_name = "UNT"

[[unt.elements]]
de = "0074"
de_name = "Nombre de segments"
format_complet = "n..6"
format_utilise = "n..6"
observation = "Nombre de segment inclus dans le message (segment UNT inclus)"

[[unt.elements]]
de = "0062"
de_name = "Numéro référence unique du message"
format_complet = "an..14"
format_utilise = "an..14"
observation = "DE 0062 dans UNH doit avoir la même valeur"

[unz]
description = "Footer de l'interchange"
segment_name = "UNZ"

[[unz.elements]]
de = "0036"
de_name = "Nombre de messages"
format_complet = "n..6"
format_utilise = "n..6"
observation = "Nombre de messages ou groupes fonctionnels dans l'interchange"

[[unz.elements]]
de = "0020"
de_name = "Référence unique de l'interchange"
format_complet = "14an"
format_utilise = "6n"
observation = "DE 0020 dans UNB doit avoir la même valeur"
